apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-calc-deployment
  labels:
    app: kube-calc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kube-calc
  template:
    metadata:
      labels:
        app: kube-calc
    spec:
      containers:
      - name: calculator
        image: kube-calc-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
